<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity Admin</title>
    <link rel="stylesheet" href="Styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<body>
    <!-- Auth View -->
    <div id="admin-auth-view" class="auth-container">
        <div class="auth-card">
            <div style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">
                <i class="ti ti-shield-lock"></i>
            </div>
            <h2>Acceso Administrador</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Ingresa tus credenciales para acceder al panel.</p>
            
            <div class="form-group" style="text-align: left;">
                <label for="admin-email">Correo Electrónico</label>
                <input type="email" id="admin-email" class="form-control" onkeydown="if(event.key==='Enter') loginAdmin()">
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label for="admin-password">Contraseña</label>
                <input type="password" id="admin-password" class="form-control" onkeydown="if(event.key==='Enter') loginAdmin()">
            </div>
            
            <button class="btn-sage btn-block" onclick="loginAdmin()">Entrar</button>
            <p id="admin-auth-error" style="color: red; margin-top: 1rem; font-size: 0.9rem;"></p>
        </div>
    </div>

    <div id="admin-layout" class="admin-layout hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <i class="ti ti-leaf"></i>
                Serenity Masajes
            </div>
            <nav class="nav-menu">
                <button class="tab-btn on" onclick="switchTab('agenda', this)">
                    <i class="ti ti-calendar"></i> Agenda
                </button>
                <button class="tab-btn" onclick="switchTab('clientes', this)">
                    <i class="ti ti-users"></i> Clientes
                </button>
                <button class="tab-btn" onclick="switchTab('nueva', this)">
                    <i class="ti ti-plus"></i> Nueva Cita
                </button>
                <div style="flex:1"></div>
                <button class="tab-btn" onclick="logoutAdmin()">
                    <i class="ti ti-logout"></i> Cerrar Sesión
                </button>
                <a href="index.html" class="tab-btn" target="_blank" style="text-decoration:none">
                    <i class="ti ti-external-link"></i> Vista Cliente
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Agenda Tab -->
            <div id="tab-agenda" class="tab-pane">
                <div class="stats-header">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="ti ti-clock"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-libres">--</h3>
                            <p>Horas Libres Semanales</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="ti ti-users"></i></div>
                        <div class="stat-info">
                            <h3 id="stat-clientes">--</h3>
                            <p>Clientes Activos</p>
                        </div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2 id="agenda-title" style="margin-bottom: 0;">Agenda Semanal</h2>
                    <div class="view-toggle"
                        style="background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: flex; overflow: hidden;">
                        <button class="view-btn active" id="btn-semanal" onclick="switchAgendaView('semanal')"
                            style="padding: 6px 12px; border: none; background: var(--primary); color: white; cursor: pointer; font-family: inherit; font-size: 0.9rem;">Semanal</button>
                        <button class="view-btn" id="btn-mensual" onclick="switchAgendaView('mensual')"
                            style="padding: 6px 12px; border: none; background: transparent; color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.9rem;">Mensual</button>
                    </div>
                </div>
                <div class="grid-container" id="view-semanal">
                    <div id="grid-head"></div>
                    <div id="grid-body"></div>
                </div>
                <div class="grid-container hidden" id="view-mensual"
                    style="padding: 1rem; background: var(--surface); border-radius: 12px;">
                    <div class="month-grid" id="month-body"
                        style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;"></div>
                </div>
            </div>

            <!-- Clientes Tab -->
            <div id="tab-clientes" class="tab-pane hidden">
                <h2>Directorio de Clientes</h2>
                <input type="text" class="search-bar" placeholder="Buscar por nombre o cédula..."
                    oninput="filterClients(this.value)">
                <div class="clients-grid" id="client-list">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <!-- Nueva Cita Tab -->
            <div id="tab-nueva" class="tab-pane hidden">
                <h2>Agendar Nueva Cita</h2>
                <div class="form-card">
                    <div class="form-group">
                        <label for="a-client">Nombre del Cliente</label>
                        <input type="text" id="a-client" class="form-control" placeholder="Ana Gómez"
                            oninput="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label for="a-cedula">Cédula del Cliente</label>
                        <input type="text" id="a-cedula" class="form-control" placeholder="123456789"
                            oninput="updatePreview()">
                    </div>
                    <div class="form-group">
                        <label for="a-phone">Teléfono (WhatsApp)</label>
                        <input type="text" id="a-phone" class="form-control" placeholder="573001234567">
                    </div>
                    <div class="form-group">
                        <label for="a-service">Servicio</label>
                        <select id="a-service" class="form-control" onchange="updatePreview()">
                            <!-- Loaded via JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fecha de la Cita</label>
                        <input type="date" id="a-date" class="form-control" onchange="selectAdminDate(this.value)">
                    </div>
                    <div class="form-group">
                        <label>Hora de la Cita</label>
                        <div class="time-grid" id="a-times"></div>
                    </div>

                    <div id="a-wa-prev" class="preview-box">
                        <!-- Preview loaded via JS -->
                    </div>

                    <button class="btn-sage btn-block" style="margin-top: 1.5rem" onclick="adminConfirm()">
                        <i class="ti ti-brand-whatsapp"></i> Enviar Confirmación por WhatsApp
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="ti ti-check"></i>
        <span></span>
    </div>

    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- Scripts -->
    <script src="firebase-config.js"></script>
    <script src="Data.js"></script>
    <script src="Admin.js"></script>
</body>

</html>
